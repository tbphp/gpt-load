name: Release Windows Build
permissions:
  contents: write

on:
  push:
    tags:
      - "*"
jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Validate and build web UI
        uses: ./.github/actions/web-ci
      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: go.sum
      - name: Build Backend
        run: |
          go mod download
          go build -ldflags "-s -w -X gpt-load/internal/platform/version.Version=${{ github.ref_name }}" -o gpt-load-windows-amd64.exe
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            gpt-load-windows-amd64.exe
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
