name: V2 CI

on:
  push:
    branches:
      - v2
  pull_request:
    branches:
      - v2

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build backend
        run: go build -o gpt-load .

      - name: Run race-enabled tests
        run: go test -race . ./internal/...

  windows-encryption-acl:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test Windows encryption ACL
        run: go test -v ./internal/platform/encryption -count=1
